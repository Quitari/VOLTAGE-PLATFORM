<style>
        body {
            background-color: #0A0A0A;
            color: #e5e2e1;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

<body class="font-body selection:bg-primary-container selection:text-on-primary-fixed">
<main class="min-h-screen flex flex-col md:flex-row overflow-hidden">
<!-- Left Side: Immersive Hero -->
<section class="relative w-full md:w-1/2 h-64 md:h-screen overflow-hidden group">
<div class="absolute inset-0 bg-cover bg-center transition-transform duration-700 group-hover:scale-105" data-alt="Cinematic wide shot of a professional high-end gaming setup with neon yellow accents in a dark obsidian studio environment" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuB9O2rGjx1-cqdZfLS-eg69JyiNA_xjhHjCUOALu8aNd0qeRFdjzwFhtx1PyVOkV-T6BoyMzmaBnhAspN_faKZTJveJ174rJ8aBihcsgm2MMgMzYNF7kkHnkRDMTG-gVcp5EEP6mdroLcdhOZMsqUD4C8vaAqA1W6h4WfZq6Sw2FMWDimX2-wccXIDPe-2qAZD0HNRLVk9TtIlPuX1d96HBSAY2_jNrFVYrba-bHNdaHj1nrdKQfWXuVzVVo_oN8v55TJLaN0hAx_7y')">
</div>
<div class="absolute inset-0 bg-gradient-to-r from-background via-transparent to-transparent md:bg-gradient-to-b md:from-transparent md:to-background/80"></div>
<div class="absolute inset-0 bg-[#0A0A0A]/40 backdrop-grayscale-[0.5]"></div>
<div class="relative h-full flex flex-col justify-center items-start px-8 md:px-16 lg:px-24">
<div class="space-y-2">
<h1 class="font-headline font-extrabold text-5xl md:text-7xl lg:text-8xl tracking-tighter text-primary-container">
                        VOLTAGE
                    </h1>
<p class="font-headline text-xl md:text-2xl font-light uppercase tracking-[0.2em] text-white/90">
                        Энергия твоего эфира
                    </p>
</div>
<div class="mt-12 hidden md:flex items-center gap-4">
<div class="h-[2px] w-12 bg-primary-container"></div>
<span class="text-xs font-label uppercase tracking-widest text-on-surface-variant">Precision Streaming Interface</span>
</div>
</div>
</section>
<!-- Right Side: Login Form -->
<section class="w-full md:w-1/2 flex items-center justify-center p-6 md:p-12 lg:p-24 bg-[#0A0A0A]">
<div class="w-full max-w-md bg-[#111111] p-8 md:p-10 rounded-xl shadow-2xl transition-all duration-300 border-l border-t border-white/5">
<div class="mb-10 text-left">
<h2 class="font-headline text-3xl font-bold text-white mb-2 uppercase tracking-tight">Добро пожаловать</h2>
<p class="text-on-surface-variant/70 text-sm">Авторизуйтесь, чтобы войти в систему</p>
</div>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-[10px] font-label font-bold uppercase tracking-widest text-on-surface-variant ml-1">Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary-container transition-colors">mail</span>
<input class="w-full bg-surface-container-lowest border-none border-b-2 border-outline-variant focus:border-primary-container focus:ring-0 pl-12 pr-4 py-4 text-white font-medium transition-all placeholder:text-outline-variant/50" placeholder="example@voltage.gg" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="text-[10px] font-label font-bold uppercase tracking-widest text-on-surface-variant ml-1">Пароль</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary-container transition-colors">lock</span>
<input class="w-full bg-surface-container-lowest border-none border-b-2 border-outline-variant focus:border-primary-container focus:ring-0 pl-12 pr-12 py-4 text-white font-medium transition-all placeholder:text-outline-variant/50" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-white transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Remember & Forgot -->
<div class="flex items-center justify-between text-xs font-medium">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="rounded-sm bg-surface-container-high border-outline-variant text-primary-container focus:ring-primary-container/20 w-4 h-4 transition-all" type="checkbox"/>
<span class="text-on-surface-variant group-hover:text-white transition-colors">Запомнить меня</span>
</label>
<a class="text-primary-container hover:text-primary-fixed transition-colors" href="#">Забыл пароль?</a>
</div>
<!-- Main CTA -->
<button class="w-full bg-primary-container hover:bg-primary-fixed text-on-primary-fixed font-headline font-bold py-4 rounded-lg transition-all active:scale-[0.98] shadow-lg shadow-primary-container/10 uppercase tracking-widest" type="submit">
                        Войти
                    </button>
</form>
<!-- Divider -->
<div class="relative my-8 flex items-center">
<div class="flex-grow border-t border-outline-variant/20"></div>
<span class="flex-shrink mx-4 text-[10px] font-label font-bold uppercase tracking-[0.3em] text-on-surface-variant/40">или</span>
<div class="flex-grow border-t border-outline-variant/20"></div>
</div>
<!-- Secondary Auth -->
<button class="w-full bg-[#24A1DE] hover:bg-[#24A1DE]/90 text-white font-headline font-bold py-4 rounded-lg transition-all flex items-center justify-center gap-3 active:scale-[0.98] uppercase tracking-widest text-xs">
<svg class="w-5 h-5 fill-current" viewbox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.96 1.24-5.54 3.65-.52.36-.99.53-1.41.52-.46-.01-1.35-.26-2.01-.48-.81-.27-1.45-.42-1.39-.88.03-.24.37-.48 1.02-.73 3.99-1.74 6.66-2.88 8.01-3.43 3.82-1.56 4.61-1.83 5.13-1.84.11 0 .37.03.54.17.14.11.18.27.2.38 0 .05.02.16 0 .2z"></path></svg>
                    Войти через Telegram
                </button>
<!-- Footer -->
<div class="mt-10 text-center">
<p class="text-sm text-on-surface-variant/60">
                        Нет аккаунта? 
                        <a class="text-white hover:text-primary-container font-bold ml-1 transition-colors underline-offset-4 hover:underline" href="#">Зарегистрироваться</a>
</p>
</div>
</div>
</section>
</main>
<!-- Global Footer Component (Shared) -->
<footer class="bg-[#0A0A0A] w-full py-8 border-t border-[#4C4732]/15 mt-auto">
<div class="flex flex-col md:flex-row justify-between items-center px-12 max-w-full gap-6">
<div class="text-[#9caffc] font-bold font-headline tracking-tighter text-xl">KINETIC</div>
<div class="flex gap-8">
<a class="font-['Manrope'] text-xs tracking-widest uppercase text-white/40 hover:text-[#9caffc] transition-colors" href="#">ПОДДЕРЖКА</a>
<a class="font-['Manrope'] text-xs tracking-widest uppercase text-white/40 hover:text-[#9caffc] transition-colors" href="#">КОНФИДЕНЦИАЛЬНОСТЬ</a>
<a class="font-['Manrope'] text-xs tracking-widest uppercase text-white/40 hover:text-[#9caffc] transition-colors" href="#">ПРАВИЛА</a>
</div>
<div class="font-['Manrope'] text-xs tracking-widest uppercase text-white/40">
                © 2024 KINETIC PRECISION. ВСЕ ПРАВА ЗАЩИЩЕНЫ.
            </div>
</div>
</footer>
</body></html>
